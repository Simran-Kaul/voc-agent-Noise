name: Weekly VoC Intelligence Agent

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Show repo files
        run: ls -la

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VoC pipeline
        run: |
          python tools/flipkart_prodA.py
          python tools/flipkart_prodB.py
          python tools/analyze_reviews.py
          python tools/generate_report.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Upload VoC Reports
        uses: actions/upload-artifact@v4
        with:
          name: voc-reports
          path: |
            global_voc_report.md
            weekly_delta_report.md
            reviews.db